<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Home</title>
</head>
<body>

    <h1>FIFA World Cup 2026 Prognostics</h1>
    <a sec:authorize="hasRole('USER')" th:href="@{/teams}">
        My Team
    </a> <br/>
    <a th:href="@{/teams/leaderboard}">Leaderboard</a><br/>
    <a sec:authorize="hasRole('USER')" th:href="@{/prognostics}">My Prognostics</a>
    <p sec:authorize="isAuthenticated()" th:text="|currently logged in as ${member?.name}|"></p>
    <h2>Matches</h2>
        <table  border="1" cellpadding="8" cellspacing="0">
            <thead>
                <tr>
                    <th>Team A</th>
                    <th>Team B</th>
                    <th>Date</th>
                    <th>Time</th>
                    <th>Location</th>
                    <th>Match Details</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="match : ${matches}">
                    <td th:text="${match.countryA}"></td>
                    <td th:text="${match.countryB}"></td>
                    <td th:text="${match.date}"></td>
                    <td th:text="|${match.startTime} - ${match.endTime}|"></td>
                    <td th:text="|${match.stadiumName}, ${match.stadiumCity}|"></td>
                    <td>
                        <a th:href="@{/matches/{matchId}(matchId=${match.id})}">
                            Details
                       </a>
                    </td>
                </tr>
            </tbody>
        </table>
        <a sec:authorize="hasRole('ADMIN')" th:href="@{/matches}">
            Manage Matches
        </a> <br/>
        <a sec:authorize="hasRole('ADMIN')" th:href="@{/stadiums}">
            Manage Stadiums
        </a>

    <form th:action="@{/logout}" method="post">
        <input type="submit" value="Logout">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
    </form>
    <form th:if="${member == null}" th:action="@{/login}" method="get">
        <button type="submit">Login</button>
    </form>
</body>

</html>
