<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Prognostics</title>
</head>
<body>
<div th:replace="fragments/header::header"></div>

    <h2>My Prognostics</h2>

    <div th:each="p : ${prognostics}">
        <h3 th:text="|Prognostics: ${p.match.countryA} VS. ${p.match.countryB}|"></h3>
        <p th:text="${p.match.date}"></p>
        <table border="1" cellpadding="8" cellspacing="0">
            <thead>
            <tr>
                <th></th>
                <th th:text="${p.match.countryA}"></th>
                <th th:text="${p.match.countryB}"></th>
            </tr>
            </thead>
            <tbody>
            <tr>
                <td>Goals</td>
                <td th:text="${p.goalsTeamA}"></td>
                <td th:text="${p.goalsTeamB}"></td>
            </tr>
            </tbody>
        </table>
    </div>
    <div th:if="${#lists.isEmpty(prognostics)}">
        <p>No prognostics yet.</p>
    </div>
</body>
</html>
