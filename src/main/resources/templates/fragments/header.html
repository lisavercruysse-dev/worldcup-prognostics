<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<header th:fragment="header">
    <h1 th:text="#{general.title}"></h1>
    <p sec:authorize="isAuthenticated()" th:text="|#{general.loginInfo} ${#authentication.name}
   (${#messages.msg('role.' + #authentication.authorities[0].authority)})|"></p>
    <form sec:authorize="isAuthenticated()" th:action="@{/logout}" method="post">
        <input type="submit" value="Logout">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
    </form>
    <form sec:authorize="isAnonymous()" th:action="@{/login}" method="get">
        <button type="submit">Login</button>
    </form>

</header>
</body>
</html>
